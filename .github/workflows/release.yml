name: Stream Deck Plugin Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build & Package Plugin
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      # 1. Binary bauen
      - name: Build Binary
        run: cargo build --release

      # 2. Ordnerstruktur vorbereiten (MUSS auf .sdPlugin enden)
      - name: Prepare Plugin Directory
        shell: pwsh
        run: |
          $pluginDir = "de.thatzok.thebus.sdPlugin"
          New-Item -ItemType Directory -Path $pluginDir -Force
          Copy-Item "target/release/thebus-streamdeck-plugin.exe" "$pluginDir/"
          if (Test-Path "assets") {
            Copy-Item -Path "assets/*" -Destination "$pluginDir/" -Recurse -Force
          }
          # Das Tool braucht einen leeren Output-Ordner
          New-Item -ItemType Directory -Path "Release" -Force

      # 3. Offizielles Distribution Tool nutzen
      - name: Package with Elgato Tool
        uses: AdamCarballo/streamdeck-distribution-tool@v1
        with:
          input: de.thatzok.thebus.sdPlugin
          output: Release

      # 4. Upload zum GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # Das Tool generiert den Dateinamen automatisch im Output-Ordner
          files: "Release/de.thatzok.thebus.sdPlugin.streamDeckPlugin"
          generate_release_notes: true

